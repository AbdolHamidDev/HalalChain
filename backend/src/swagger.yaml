        "200":
          description: Paginated list of inventory movements
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/InventoryMovement"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ══════════════════════════════════════════════════════════
  # Purchase Orders
  # ══════════════════════════════════════════════════════════

  /api/purchase-orders:
    get:
      tags:
        - Purchase Orders
      summary: List purchase orders (paginated, filterable)
      description: Returns a paginated list of purchase orders. Supports filtering by status and supplierId. Requires ADMIN or MANAGER role.
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          description: Filter by PO status
          schema:
            type: string
            enum:
              - DRAFT
              - APPROVED
              - SHIPPING
              - RECEIVED
              - CANCELLED
              - PARTIAL
            example: "APPROVED"
        - name: supplierId
          in: query
          description: Filter by supplier UUID; returns empty list if supplier does not exist
          schema:
            type: string
            format: uuid
            example: "660e8400-e29b-41d4-a716-446655440001"
      responses:
        "200":
          description: Paginated list of purchase orders (each includes `itemCount`)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Invalid status value."
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Purchase Orders
      summary: Create a new purchase order (ADMIN only)
      description: Creates a PO with one or more line items. Server computes `subtotal` per item and `totalAmount`. A `poNumber` is auto-generated if not provided.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - supplierId
                - items
              properties:
                supplierId:
                  type: string
                  format: uuid
                  example: "660e8400-e29b-41d4-a716-446655440001"
                poNumber:
                  type: string
                  minLength: 3
                  maxLength: 50
                  description: Optional; auto-generated as PO-YYYY-NNNN if omitted
                  example: "PO-2024-00042"
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - productId
                      - quantity
                      - unitPrice
                    properties:
                      productId:
                        type: string
                        format: uuid
                        example: "770e8400-e29b-41d4-a716-446655440002"
                      quantity:
                        type: integer
                        minimum: 1
                        example: 300
                      unitPrice:
                        type: number
                        minimum: 0.01
                        example: 12.50
            example:
              supplierId: "660e8400-e29b-41d4-a716-446655440001"
              items:
                - productId: "770e8400-e29b-41d4-a716-446655440002"
                  quantity: 300
                  unitPrice: 12.50
                - productId: "771e8400-e29b-41d4-a716-446655440003"
                  quantity: 50
                  unitPrice: 8.00
      responses:
        "201":
          description: Purchase order created with all line items
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseOrder:
                    allOf:
                      - $ref: "#/components/schemas/PurchaseOrder"
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/PurchaseOrderItem"
              example:
                purchaseOrder:
                  id: "cc0e8400-e29b-41d4-a716-446655440007"
                  supplierId: "660e8400-e29b-41d4-a716-446655440001"
                  poNumber: "PO-2024-00042"
                  status: "DRAFT"
                  totalAmount: 4150.00
                  createdAt: "2024-05-20T11:00:00.000Z"
                  supplier:
                    name: "Al-Barakah Foods Sdn Bhd"
                    country: "Malaysia"
                  items:
                    - id: "dd0e8400-e29b-41d4-a716-446655440008"
                      purchaseOrderId: "cc0e8400-e29b-41d4-a716-446655440007"
                      productId: "770e8400-e29b-41d4-a716-446655440002"
                      quantity: 300
                      unitPrice: 12.50
                      subtotal: 3750.00
                      createdAt: "2024-05-20T11:00:00.000Z"
                    - id: "dd1e8400-e29b-41d4-a716-446655440009"
                      purchaseOrderId: "cc0e8400-e29b-41d4-a716-446655440007"
                      productId: "771e8400-e29b-41d4-a716-446655440003"
                      quantity: 50
                      unitPrice: 8.00
                      subtotal: 400.00
                      createdAt: "2024-05-20T11:00:00.000Z"
        "400":
          description: Validation error — missing or invalid items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Invalid items"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Supplier or product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Product not found"

  /api/purchase-orders/{id}:
    get:
      tags:
        - Purchase Orders
      summary: Get a single purchase order by ID (includes items)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Purchase order with full item details
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseOrder:
                    allOf:
                      - $ref: "#/components/schemas/PurchaseOrder"
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/PurchaseOrderItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Purchase order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Purchase Orders
      summary: Delete a purchase order (ADMIN only, DRAFT status only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Purchase order deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Purchase order deleted"
        "400":
          description: Cannot delete — not in DRAFT status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Purchase order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/purchase-orders/{id}/status:
    patch:
      tags:
        - Purchase Orders
      summary: Update purchase order status (ADMIN only)
      description: Transitions the PO status following allowed progression — DRAFT→APPROVED→SHIPPING→RECEIVED.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - DRAFT
                    - APPROVED
                    - SHIPPING
                    - RECEIVED
                    - CANCELLED
                    - PARTIAL
                  example: "APPROVED"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  purchaseOrder:
                    $ref: "#/components/schemas/PurchaseOrder"
        "400":
          description: Invalid status transition or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Purchase order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ══════════════════════════════════════════════════════════
  # Shipments
  # ══════════════════════════════════════════════════════════

  /api/shipments:
    get:
      tags:
        - Shipments
      summary: List shipments (paginated)
      description: Returns a paginated list of shipments. Requires ADMIN or MANAGER role.
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated list of shipments
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Shipment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/shipments/{id}:
    get:
      tags:
        - Shipments
      summary: Get a single shipment by ID
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Shipment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  shipment:
                    $ref: "#/components/schemas/Shipment"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/shipments/{id}/status:
    patch:
      tags:
        - Shipments
      summary: Update shipment status or details (ADMIN only)
      description: Updates shipment fields including status. When status is changed to DELAYED, a notification is sent to all ADMIN and MANAGER users.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                trackingNumber:
                  type: string
                  minLength: 3
                  maxLength: 100
                origin:
                  type: string
                  minLength: 2
                  maxLength: 200
                destination:
                  type: string
                  minLength: 2
                  maxLength: 200
                status:
                  type: string
                  enum:
                    - PENDING
                    - IN_TRANSIT
                    - DELIVERED
                    - DELAYED
                  example: "IN_TRANSIT"
                estimatedArrival:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        "200":
          description: Shipment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  shipment:
                    $ref: "#/components/schemas/Shipment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ══════════════════════════════════════════════════════════
  # Audit Logs
  # ══════════════════════════════════════════════════════════

  /api/audit-logs:
    get:
      tags:
        - Audit Logs
      summary: List audit logs (ADMIN only, paginated)
      description: Returns a paginated list of audit log records ordered by createdAt descending. Default page size is 50, maximum 100. Requires ADMIN role.
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Page size (default 50, maximum 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: entityType
          in: query
          description: Filter by entity type (e.g. Supplier, Product, Shipment)
          schema:
            type: string
            example: "Supplier"
        - name: entityId
          in: query
          description: Filter by specific entity UUID
          schema:
            type: string
            format: uuid
            example: "660e8400-e29b-41d4-a716-446655440001"
      responses:
        "200":
          description: Paginated list of audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuditLog"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: ADMIN role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ══════════════════════════════════════════════════════════
  # Notifications
  # ══════════════════════════════════════════════════════════

  /api/notifications:
    get:
      tags:
        - Notifications
      summary: List notifications for the authenticated user (paginated)
      description: Returns the calling user's notifications ordered by createdAt descending. Default page size is 20.
      security:
        - cookieAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Notification"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/notifications/read-all:
    patch:
      tags:
        - Notifications
      summary: Mark all notifications as read
      description: Sets isRead=true for all unread notifications belonging to the calling user.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Count of notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                    example: 5
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/notifications/{id}/read:
    patch:
      tags:
        - Notifications
      summary: Mark a single notification as read
      description: Sets isRead=true for a specific notification. Only the owning user can mark their own notification as read.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Notification not found or belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Notification not found"

  # ══════════════════════════════════════════════════════════
  # Dashboard
  # ══════════════════════════════════════════════════════════

  /api/dashboard/stats:
    get:
      tags:
        - Dashboard
      summary: Get dashboard KPIs and chart data (ADMIN or MANAGER)
      description: Returns real-time KPI counts and analytics charts including inventory trend, purchase orders per month, shipment status distribution, and certificate expiry trend.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  kpis:
                    type: object
                    properties:
                      totalSuppliers:
                        type: integer
                        example: 24
                      activeCertificates:
                        type: integer
                        example: 18
                      expiringSoonCertificates:
                        type: integer
                        example: 3
                      inventoryValue:
                        type: number
                        format: float
                        example: 142500.00
                      pendingShipments:
                        type: integer
                        example: 7
                  charts:
                    type: object
                    properties:
                      inventoryTrend:
                        type: array
                        items:
                          type: object
                          properties:
                            month:
                              type: string
                              example: "2024-06"
                            quantity:
                              type: integer
                              example: 350
                      purchaseOrdersPerMonth:
                        type: array
                        items:
                          type: object
                          properties:
                            month:
                              type: string
                              example: "2024-06"
                            orders:
                              type: integer
                              example: 12
                      shipmentStatusDistribution:
                        type: array
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                              example: "IN_TRANSIT"
                            count:
                              type: integer
                              example: 5
                      certificateExpiryTimeline:
                        type: array
                        items:
                          type: object
                          properties:
                            quarter:
                              type: string
                              example: "2024-Q3"
                            count:
                              type: integer
                              example: 4
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Database query failed — partial data not returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Failed to compute dashboard analytics"

  /api/dashboard/activity:
    get:
      tags:
        - Dashboard
      summary: Get the 20 most recent activity feed entries (ADMIN or MANAGER)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Recent audit log activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    maxItems: 20
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        userName:
                          type: string
                          description: Name of the user who performed the action, or "System" if system-initiated
                          example: "Ahmad Zainal"
                        action:
                          type: string
                          enum:
                            - CREATE
                            - UPDATE
                            - DELETE
                            - STATUS_CHANGE
                        entityType:
                          type: string
                          example: "Supplier"
                        entityId:
                          type: string
                          format: uuid
                        createdAt:
                          type: string
                          format: date-time
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ══════════════════════════════════════════════════════════
  # Public (no authentication required)
  # ══════════════════════════════════════════════════════════

  /api/public/products/{id}/traceability:
    get:
      tags:
        - Public
      summary: Get public traceability data for a product (no auth required)
      description: Public endpoint — no JWT cookie required. Returns product info, supplier details, halal certificates, shipments, and the traceability timeline. Used by the consumer-facing QR scan page.
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the product
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Public traceability data
          content:
            application/json:
              schema:
                type: object
                required:
                  - product
                  - supplier
                  - certificates
                  - shipments
                  - timeline
                properties:
                  product:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      sku:
                        type: string
                  supplier:
                    type: object
                    properties:
                      name:
                        type: string
                      country:
                        type: string
                  certificates:
                    type: array
                    items:
                      type: object
                      properties:
                        certificateNumber:
                          type: string
                        expiryDate:
                          type: string
                          format: date
                        issuedBy:
                          type: string
                  shipments:
                    type: array
                    items:
                      type: object
                      properties:
                        trackingNumber:
                          type: string
                        status:
                          type: string
                  timeline:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        date:
                          type: string
                          format: date-time
                        title:
                          type: string
                        description:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Product not found"

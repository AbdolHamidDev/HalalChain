  /api/products/{id}/traceability:
    get:
      tags:
        - Products
      summary: Get full supply chain traceability timeline for a product
      description: Returns the product details and a chronological timeline of all supply chain events — supplier, halal certificates, purchase orders, shipments, and inventory movements. Requires ADMIN or MANAGER role.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID of the product
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Traceability timeline with all supply chain events
          content:
            application/json:
              schema:
                type: object
                required:
                  - product
                  - timeline
                properties:
                  product:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      sku:
                        type: string
                  timeline:
                    type: array
                    items:
                      type: object
                      required:
                        - type
                        - date
                        - title
                        - description
                        - metadata
                      properties:
                        type:
                          type: string
                          enum:
                            - SUPPLIER
                            - CERTIFICATE
                            - PRODUCT
                            - PURCHASE_ORDER
                            - SHIPMENT
                            - INVENTORY
                        date:
                          type: string
                          format: date-time
                        title:
                          type: string
                        description:
                          type: string
                        metadata:
                          type: object
                          additionalProperties: true
              example:
                product:
                  id: "770e8400-e29b-41d4-a716-446655440002"
                  name: "Halal Chicken Breast"
                  sku: "HCB-001"
                timeline:
                  - type: "SUPPLIER"
                    date: "2024-01-10T06:00:00.000Z"
                    title: "Supplier: Al-Barakah Foods Sdn Bhd"
                    description: "Malaysia · ACTIVE"
                    metadata:
                      supplierId: "660e8400-e29b-41d4-a716-446655440001"
                      supplierName: "Al-Barakah Foods Sdn Bhd"
                      country: "Malaysia"
                      status: "ACTIVE"
                  - type: "CERTIFICATE"
                    date: "2024-01-01T00:00:00.000Z"
                    title: "Certificate: JAKIM/HPC/2024/001234"
                    description: "Issued by JAKIM · Expires 2025-12-31"
                    metadata:
                      certificateId: "880e8400-e29b-41d4-a716-446655440003"
                      certificateNumber: "JAKIM/HPC/2024/001234"
                      issuedDate: "2024-01-01T00:00:00.000Z"
                      expiryDate: "2025-12-31T00:00:00.000Z"
                      issuingBody: "JAKIM"
                  - type: "PRODUCT"
                    date: "2024-01-12T09:00:00.000Z"
                    title: "Product: Halal Chicken Breast"
                    description: "SKU: HCB-001"
                    metadata:
                      productId: "770e8400-e29b-41d4-a716-446655440002"
                      name: "Halal Chicken Breast"
                      sku: "HCB-001"
                  - type: "PURCHASE_ORDER"
                    date: "2024-05-20T11:00:00.000Z"
                    title: "Purchase Order: PO-2024-00042"
                    description: "Status: APPROVED · Total: 3750.00"
                    metadata:
                      poId: "cc0e8400-e29b-41d4-a716-446655440007"
                      poNumber: "PO-2024-00042"
                      status: "APPROVED"
                      totalAmount: "3750.00"
                  - type: "SHIPMENT"
                    date: "2024-06-02T06:00:00.000Z"
                    title: "Shipment: TRK-2024-98765"
                    description: "Kuala Lumpur, Malaysia → Jakarta, Indonesia · IN_TRANSIT"
                    metadata:
                      shipmentId: "ee0e8400-e29b-41d4-a716-446655440009"
                      trackingNumber: "TRK-2024-98765"
                      status: "IN_TRANSIT"
                      origin: "Kuala Lumpur, Malaysia"
                      destination: "Jakarta, Indonesia"
                  - type: "INVENTORY"
                    date: "2024-06-05T08:30:00.000Z"
                    title: "Inventory INBOUND: 300 units"
                    description: "Warehouse: Warehouse A"
                    metadata:
                      movementId: "bb0e8400-e29b-41d4-a716-446655440006"
                      type: "INBOUND"
                      quantity: 300
                      warehouseName: "Warehouse A"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role — ADMIN or MANAGER required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Product not found"

